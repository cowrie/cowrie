---
name: pypi-publish

on:  # yamllint disable-line rule:truthy
  push:
    # Publish only `tags` to pypi.org
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      tags:
        description: 'pypi upload'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pypi-publish:
    name: Upload commit to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cowrie
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
      # retrieve your distributions here, need fetch-depth to get metadata for version
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build setuptools==80.9.0 setuptools-scm==9.2.0 twine==6.2.0 wheel==0.45.1 packaging==25.0

      - name: Build and check
        run: |
          SETUPTOOLS_SCM_OVERRIDES_FOR_COWRIE='{local_scheme="no-local-version"}' python -m build
          twine check --strict dist/*

      - name: Publish package distributions to PyPI
        if: ${{ github.repository == 'cowrie/cowrie' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          verbose: true
          print-hash: true

      - name: Sleep for publishing
        run: sleep 60s
        shell: bash

      - name: Smoke-test installed package
        if: ${{ github.repository == 'cowrie/cowrie' }}
        run: |
          set -eu
          python -m pip install cowrie

          # entry point is registered and on PATH
          which cowrie

          # bundled package data is reachable via importlib.resources
          python -c "from cowrie.core.resources import read_data_bytes; assert read_data_bytes('fs.pickle')"
          python -c "from cowrie.shell.honeyfs import read_honeyfs_bytes; assert b'root:' in read_honeyfs_bytes('etc/passwd')"
          python -c "from cowrie.core.config import readConfigFile; p = readConfigFile([]); assert 'honeypot' in p.sections()"

          # cowrie init materialises a working state directory
          mkdir -p /tmp/cowrie-smoke
          cd /tmp/cowrie-smoke
          cowrie init
          test -f etc/cowrie.cfg
          test -d var/log/cowrie
          test -d var/lib/cowrie/downloads
          test -d var/lib/cowrie/tty
          test -d var/run

          # cowrie start refuses to run from uninitialised dirs
          rm -rf /tmp/cowrie-empty && mkdir /tmp/cowrie-empty && cd /tmp/cowrie-empty
          cowrie start 2>&1 | grep -q "not initialised"
